<!DOCTYPE html>
<html>
<head>
    <title>Блог – оптимизированный пример</title>
</head>
<body>
    <h1>Список постов (оптимизировано, без N+1)</h1>
    <ul>
        {% for post in posts %}
            <li>
                <h2>{{ post.title }}</h2>
                <p>Автор: {{ post.author.username }}</p>
                <p>Категория: {{ post.category.name }}</p>
                <p>Теги:
                    {% for tag in post.tags.all %}
                        {{ tag.name }}
                    {% endfor %}
                </p>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
